name: Publication ISO sur Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag de la release (ex: v1.0.0)'
        required: true
        default: 'v1.0.0'
      run_id:
        description: 'ID du build run contenant l ISO (laisser vide pour le dernier run reussi)'
        required: false
        default: ''

jobs:
  publish:
    name: "Publication ISO"
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Déterminer le run ID
        id: runid
        run: |
          if [ -n "${{ github.event.inputs.run_id }}" ]; then
            RUN_ID="${{ github.event.inputs.run_id }}"
          else
            RUN_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/runs?status=success&per_page=1" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['workflow_runs'][0]['id'])")
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Utilisant le run ID: $RUN_ID"

      - name: Télécharger l'ISO
        uses: actions/download-artifact@v4
        with:
          name: nemOS-ISO
          run-id: ${{ steps.runid.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Télécharger les checksums
        uses: actions/download-artifact@v4
        with:
          name: nemOS-checksums
          run-id: ${{ steps.runid.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Vérifier les fichiers
        run: |
          echo "=== Fichiers téléchargés ==="
          ls -lh *.iso *.sha256
          ISO_FILE=$(ls *.iso 2>/dev/null | head -1)
          if [ -z "$ISO_FILE" ]; then
            echo "ERREUR: Aucun fichier ISO trouvé"
            exit 1
          fi
          echo "ISO: $ISO_FILE ($(du -sh "$ISO_FILE" | cut -f1))"

      - name: Upload sur la release via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          REPO="${{ github.repository }}"
          ISO_FILE=$(ls *.iso 2>/dev/null | head -1)
          SHA_FILE=$(ls *.sha256 2>/dev/null | head -1)

          echo "Publication sur la release $TAG..."
          echo "Fichiers: $ISO_FILE, $SHA_FILE"

          # Trouver l'upload URL de la release existante
          RELEASE_DATA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG")

          UPLOAD_URL=$(echo "$RELEASE_DATA" | python3 -c "import json,sys; print(json.load(sys.stdin)['upload_url'].split('{?')[0])")

          if [ -z "$UPLOAD_URL" ]; then
            echo "Release $TAG non trouvee, creation via gh..."
            gh release create "$TAG" \
              --title "nemOS $TAG" \
              --notes "nemOS $TAG - Distribution Linux 32-bit avec interface macOS-like

              ## Utilisation
              1. Flasher l ISO sur une cle USB avec Rufus ou BalenaEtcher
              2. Demarrer l ordinateur depuis la cle USB
              3. Profiter de nemOS !

              ## Systeme requis
              - Processeur 32-bit (i686) ou 64-bit compatible
              - 512 Mo RAM minimum
              - 4 Go d espace disque"
            # Re-get upload URL after creation
            sleep 2
            RELEASE_DATA=$(curl -s -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/releases/tags/$TAG")
            UPLOAD_URL=$(echo "$RELEASE_DATA" | python3 -c "import json,sys; print(json.load(sys.stdin)['upload_url'].split('{?')[0])")
          fi

          echo "Upload URL: $UPLOAD_URL"

          # Uploader l'ISO
          echo "Upload de $ISO_FILE..."
          curl --progress-bar -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/x-iso9660-image" \
            --data-binary "@$ISO_FILE" \
            "$UPLOAD_URL?name=$(basename $ISO_FILE)" | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'  ISO uploadé: {d.get(\"name\",\"?\")} ({d.get(\"size\",0)} bytes)') if 'name' in d else print(f'  Erreur: {d}')"

          # Uploader le checksum
          echo "Upload de $SHA_FILE..."
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: text/plain" \
            --data-binary "@$SHA_FILE" \
            "$UPLOAD_URL?name=$(basename $SHA_FILE)" | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'  Checksum uploadé: {d.get(\"name\",\"?\")}')" if 'name' in d else print(f'  Erreur: {d}')"

          echo "Publication terminee !"
