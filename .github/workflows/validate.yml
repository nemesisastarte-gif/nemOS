# =============================================================================
# Validation légère nemOS
# =============================================================================
# Ce workflow s'exécute sur chaque push et pull request pour vérifier
# rapidement la santé du projet sans nécessiter d'environnement spécial.
#
# Vérifications effectuées :
#   - Existence de tous les fichiers requis
#   - Analyse ShellCheck des scripts shell
#   - Validation syntaxique des fichiers JSON
#   - Vérification des liens Markdown
#   - Détection de tokens/secrets dans le code
# =============================================================================

name: Validation nemOS

on:
  push:
    branches: [main, dev, '*']
  pull_request:
    branches: [main]

# Annulation des runs précédents sur la même PR
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: "Validation du projet"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Installation des outils
      # -----------------------------------------------------------------------
      - name: Installation des outils de validation
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            shellcheck \
            jq \
            jsonlint \
            fd-find \
            rename

      # -----------------------------------------------------------------------
      # Vérification des fichiers requis
      # -----------------------------------------------------------------------
      - name: Vérification des fichiers requis
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  📋 Vérification des fichiers requis"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          ERRORS=0

          # Fichiers de premier niveau
          declare -A FILES=(
            ["build.sh"]="Script de construction principal"
            ["README.md"]="Documentation principale"
            ["LICENSE"]="Licence du projet"
            ["services.sh"]="Configuration des services"
          )

          # Fichiers dans les sous-répertoires
          declare -A SUB_FILES=(
            ["packages/packages.i686"]="Liste des paquets i686"
            ["nem/profiledef.sh"]="Profil de construction archiso"
            ["nem/pacman.conf"]="Configuration pacman"
            ["nem/pacman.d/mirrorlist"]="Miroirs pacman"
            ["nem/airootfs/etc/os-release"]="Identification du système"
            ["nem/airootfs/etc/lsb-release"]="Informations LSB"
            ["nem/airootfs/environment"]="Variables d'environnement"
            ["nem/syslinux/syslinux.cfg"]="Configuration Syslinux"
            ["scripts/nemos-firstboot.sh"]="Script de premier démarrage"
            ["scripts/nemos-chroot-build.sh"]="Script de construction chroot"
            ["scripts/nemos-cleanup.sh"]="Script de nettoyage"
            ["docs/BUILD.md"]="Documentation de construction"
            ["docs/INSTALL.md"]="Documentation d'installation"
          )

          # Vérification des fichiers racine
          echo ""
          echo "── Fichiers racine ──"
          for file in "${!FILES[@]}"; do
            if [[ -f "$file" ]]; then
              echo "  ✅ $file — ${FILES[$file]}"
            else
              echo "  ❌ MANQUANT : $file — ${FILES[$file]}"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Vérification des sous-fichiers
          echo ""
          echo "── Fichiers de configuration ──"
          for file in "${!SUB_FILES[@]}"; do
            if [[ -f "$file" ]]; then
              echo "  ✅ $file — ${SUB_FILES[$file]}"
            else
              echo "  ❌ MANQUANT : $file — ${SUB_FILES[$file]}"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Vérification des assets
          echo ""
          echo "── Ressources graphiques ──"
          ASSETS=(
            "nemOS-assets/logo/nemos-logo.svg"
            "nemOS-assets/logo/nemos-logo-rounded.svg"
            "nemOS-assets/wallpapers/nemos-default.png"
            "nemOS-assets/wallpapers/nemos-dark.png"
          )
          for asset in "${ASSETS[@]}"; do
            if [[ -f "$asset" ]]; then
              SIZE=$(stat -c%s "$asset" 2>/dev/null || echo "0")
              echo "  ✅ $asset (${SIZE} octets)"
            else
              echo "  ⚠️  MANQUANT : $asset"
            fi
          done

          # Vérification du thème GTK
          echo ""
          echo "── Thème GTK nemOS-Dark ──"
          GTK_FILES=(
            "nem/airootfs/usr/share/themes/nemOS-Dark/gtk-2.0/gtkrc"
            "nem/airootfs/usr/share/themes/nemOS-Dark/gtk-3.0/gtk.css"
            "nem/airootfs/usr/share/themes/nemOS-Dark/gtk-3.0/gtk-dark.css"
          )
          for gfile in "${GTK_FILES[@]}"; do
            if [[ -f "$gfile" ]]; then
              echo "  ✅ $gfile"
            else
              echo "  ❌ MANQUANT : $gfile"
              ERRORS=$((ERRORS + 1))
            fi
          done

          echo ""
          if [[ $ERRORS -gt 0 ]]; then
            echo "❌ $ERRORS fichier(s) requis manquant(s) !"
            exit 1
          fi
          echo "✅ Tous les fichiers requis sont présents."

      # -----------------------------------------------------------------------
      # Validation ShellCheck
      # -----------------------------------------------------------------------
      - name: Analyse ShellCheck des scripts
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🔍 Analyse ShellCheck"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Trouver tous les scripts shell
          mapfile -t SHELL_FILES < <(find . -name "*.sh" -not -path "./.git/*" -not -path "*/node_modules/*" | sort)

          echo "  📄 ${#SHELL_FILES[@]} fichier(s) shell trouvé(s)"
          echo ""

          SC_ERRORS=0
          SC_WARNINGS=0

          for script in "${SHELL_FILES[@]}"; do
            echo "── $(basename "$script") ──"

            # Exécuter shellcheck avec des exceptions courantes pour les scripts de build
            RESULT=$(shellcheck \
              -s bash \
              -e SC1090 \
              -e SC1091 \
              -e SC2034 \
              -e SC2086 \
              -e SC2155 \
              -e SC2312 \
              --format=tty \
              "$script" 2>&1)

            if [[ $? -eq 0 ]]; then
              echo "  ✅ Aucun problème détecté"
            else
              echo "$RESULT" | sed 's/^/  /'
              # Compter les erreurs vs avertissements
              ERR_COUNT=$(echo "$RESULT" | grep -c "error" 2>/dev/null || echo "0")
              WARN_COUNT=$(echo "$RESULT" | grep -c "warning" 2>/dev/null || echo "0")
              SC_ERRORS=$((SC_ERRORS + ERR_COUNT))
              SC_WARNINGS=$((SC_WARNINGS + WARN_COUNT))
            fi
            echo ""
          done

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Résumé ShellCheck"
          echo "  Erreurs   : $SC_ERRORS"
          echo "  Avertissements : $SC_WARNINGS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Les erreurs SC bloquent le CI, les avertissements non
          if [[ $SC_ERRORS -gt 0 ]]; then
            echo "❌ Des erreurs ShellCheck doivent être corrigées"
            exit 1
          fi
          echo "✅ Analyse ShellCheck terminée avec succès"

      # -----------------------------------------------------------------------
      # Validation JSON
      # -----------------------------------------------------------------------
      - name: Validation des fichiers JSON
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  📋 Validation des fichiers JSON"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          JSON_ERRORS=0
          mapfile -t JSON_FILES < <(find . -name "*.json" -not -path "./.git/*" -not -path "*/node_modules/*" | sort)

          if [[ ${#JSON_FILES[@]} -eq 0 ]]; then
            echo "  ℹ️  Aucun fichier JSON trouvé"
            exit 0
          fi

          for jfile in "${JSON_FILES[@]}"; do
            echo -n "  $jfile ... "
            if jq empty "$jfile" 2>/dev/null; then
              echo "✅"
            else
              echo "❌"
              jq . "$jfile" 2>&1 | head -5
              JSON_ERRORS=$((JSON_ERRORS + 1))
            fi
          done

          if [[ $JSON_ERRORS -gt 0 ]]; then
            echo "❌ $JSON_ERRORS fichier(s) JSON invalide(s)"
            exit 1
          fi
          echo "✅ Tous les fichiers JSON sont valides"

      # -----------------------------------------------------------------------
      # Vérification des liens Markdown
      # -----------------------------------------------------------------------
      - name: Vérification des liens Markdown
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🔗 Vérification des liens Markdown"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          mapfile -t MD_FILES < <(find . -name "*.md" -not -path "./.git/*" | sort)

          BROKEN_LINKS=0

          for md_file in "${MD_FILES[@]}"; do
            echo ""
            echo "── $md_file ──"

            # Extraire les liens markdown [texte](url)
            mapfile -t LINKS < <(grep -oP '\[([^\]]+)\]\(([^)]+)\)' "$md_file" 2>/dev/null | \
              grep -oP '\(([^)]+)\)' | tr -d '()')

            for link in "${LINKS[@]}"; do
              # Ignorer les ancres et les URLs externes
              if [[ "$link" == \#* ]]; then
                continue
              fi
              if [[ "$link" == http* ]]; then
                # Vérifier que l'URL n'est pas vide
                if [[ -z "${link#http}" ]]; then
                  echo "  ⚠️  URL vide dans $md_file"
                fi
                continue
              fi

              # Liens internes relatifs — vérifier le fichier cible
              DIR=$(dirname "$md_file")
              TARGET="${DIR}/${link}"

              if [[ -f "$TARGET" ]] || [[ -d "$TARGET" ]]; then
                echo "  ✅ $link"
              else
                # Essayer sans l'ancre
                CLEAN_LINK="${link%%\#*}"
                CLEAN_TARGET="${DIR}/${CLEAN_LINK}"
                if [[ -f "$CLEAN_TARGET" ]] || [[ -d "$CLEAN_TARGET" ]]; then
                  echo "  ✅ $link (avec ancre)"
                else
                  echo "  ❌ LIEN CASSÉ : $link (cible : $TARGET)"
                  BROKEN_LINKS=$((BROKEN_LINKS + 1))
                fi
              fi
            done
          done

          echo ""
          if [[ $BROKEN_LINKS -gt 0 ]]; then
            echo "❌ $BROKEN_LINKS lien(s) cassé(s) détecté(s)"
            # Non bloquant — les liens externes peuvent temporairement échouer
          else
            echo "✅ Tous les liens internes sont valides"
          fi

      # -----------------------------------------------------------------------
      # Vérification de sécurité
      # -----------------------------------------------------------------------
      - name: Détection de secrets et tokens
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🔒 Vérification de sécurité"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          SECRETS_FOUND=0

          # Patterns à rechercher (hors commentaires)
          declare -A PATTERNS=(
            ["AWS_SECRET_ACCESS_KEY"]="Clé secrète AWS"
            ["AKIA[0-9A-Z]{16}"]="ID de clé AWS"
            ["-----BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY-----"]="Clé privée"
            ["ghp_[A-Za-z0-9]{36}"]="Token GitHub (personal access)"
            ["gho_[A-Za-z0-9]{36}"]="Token GitHub (OAuth)"
            ["ghu_[A-Za-z0-9]{36}"]="Token GitHub (user-to-server)"
            ["ghs_[A-Za-z0-9]{36}"]="Token GitHub (server-to-server)"
            ["github_pat_[A-Za-z0-9_]{22,}"]="Token GitHub (fine-grained)"
            ["sk-[A-Za-z0-9]{48}"]="Clé API OpenAI"
          )

          # Fichiers à analyser
          mapfile -t SCAN_FILES < <(find . -type f \
            \( -name "*.sh" -o -name "*.py" -o -name "*.conf" -o -name "*.cfg" \
               -o -name "*.yml" -o -name "*.yaml" -o -name "*.json" -o -name "*.env" \) \
            -not -path "./.git/*" \
            -not -name "*.sha256" \
            -not -name "*.md" \
            | sort)

          for pattern_name in "${!PATTERNS[@]}"; do
            pattern="${pattern_name}"
            description="${PATTERNS[$pattern_name]}"

            for file in "${SCAN_FILES[@]}"; do
              # Ignorer les lignes de commentaire
              MATCHES=$(grep -nE "$pattern" "$file" 2>/dev/null \
                | grep -vE '^\s*#' \
                | grep -vE '^\s*//' \
                || true)

              if [[ -n "$MATCHES" ]]; then
                echo "  🔴 TROUVÉ — $description dans $file :"
                echo "$MATCHES" | head -3 | sed 's/^/       /'
                SECRETS_FOUND=$((SECRETS_FOUND + 1))
              fi
            done
          done

          echo ""
          if [[ $SECRETS_FOUND -gt 0 ]]; then
            echo "❌ $SECRETS_FOUND pattern(s) de secrets détecté(s) !"
            echo "   Vérifiez que ces valeurs ne sont pas des vrais secrets."
            echo "   Si ce sont des exemples ou des placeholders, ajoutez un"
            echo "   commentaire explicatif."
            exit 1
          fi
          echo "✅ Aucun secret ou token détecté dans le code source"

      # -----------------------------------------------------------------------
      # Validation du thème et des assets
      # -----------------------------------------------------------------------
      - name: Validation des assets graphiques
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🎨 Validation des ressources graphiques"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Vérifier les fichiers SVG
          echo ""
          echo "── Fichiers SVG ──"
          mapfile -t SVG_FILES < <(find . -name "*.svg" -not -path "./.git/*" | sort)
          for svg in "${SVG_FILES[@]}"; do
            SIZE=$(stat -c%s "$svg")
            # Vérifier que le SVG est un XML valide (basique)
            if head -1 "$svg" | grep -qi "xml\|svg"; then
              echo "  ✅ $svg (${SIZE} octets) — en-tête SVG valide"
            else
              echo "  ❌ $svg — en-tête SVG manquant ou invalide"
            fi
          done

          # Vérifier les wallpapers
          echo ""
          echo "── Fonds d'écran ──"
          mapfile -t WALLPAPERS < <(find nemOS-assets/wallpapers -name "*.png" -o -name "*.jpg" 2>/dev/null | sort)
          for wp in "${WALLPAPERS[@]}"; do
            SIZE=$(stat -c%s "$wp")
            # Taille minimum raisonnable pour une image (10 Ko)
            if [[ $SIZE -gt 10240 ]]; then
              echo "  ✅ $(basename "$wp") — ${SIZE} octets"
            else
              echo "  ⚠️  $(basename "$wp") — seulement ${SIZE} octets (fichier potentiellement vide)"
            fi
          done

          echo ""
          echo "✅ Validation des assets terminée"

      # -----------------------------------------------------------------------
      # Validation de la configuration Syslinux
      # -----------------------------------------------------------------------
      - name: Validation de la configuration Syslinux
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🖥️ Validation Syslinux"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          SYSLINUX_DIR="nem/syslinux"
          SYSLINUX_FILES=(
            "syslinux.cfg"
            "archiso_head.cfg"
            "archiso_tail.cfg"
            "archiso_sys.cfg"
            "archiso_sys-linux.cfg"
            "archiso_pxe.cfg"
            "archiso_pxe-linux.cfg"
          )

          for cfg in "${SYSLINUX_FILES[@]}"; do
            if [[ -f "${SYSLINUX_DIR}/${cfg}" ]]; then
              echo "  ✅ $cfg"
            else
              echo "  ⚠️  ${cfg} manquant"
            fi
          done

          # Vérifier que syslinux.cfg inclut les autres fichiers
          echo ""
          echo "── Vérification des inclusions ──"
          if [[ -f "${SYSLINUX_DIR}/syslinux.cfg" ]]; then
            INCLUDES=$(grep -cE 'INCLUDE|include|CONFIG' "${SYSLINUX_DIR}/syslinux.cfg" 2>/dev/null || echo "0")
            echo "  📎 $INCLUDES inclusion(s) dans syslinux.cfg"
          fi

      # -----------------------------------------------------------------------
      # Résumé final
      # -----------------------------------------------------------------------
      - name: Résumé de la validation
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║                                                  ║"
          echo "║   Validation nemOS — ${{ job.status == 'success' && '✅ RÉUSSIE' || '❌ ÉCHOUÉE' }}"
          echo "║                                                  ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  • Fichiers requis        ✅                    ║"
          echo "║  • Scripts (ShellCheck)   ✅                    ║"
          echo "║  • Fichiers JSON          ✅                    ║"
          echo "║  • Liens Markdown         ✅                    ║"
          echo "║  • Sécurité (secrets)     ✅                    ║"
          echo "║  • Ressources graphiques  ✅                    ║"
          echo "║  • Configuration Syslinux ✅                    ║"
          echo "║                                                  ║"
          echo "╚══════════════════════════════════════════════════╝"