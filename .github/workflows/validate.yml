# =============================================================================
# Validation légère nemOS
# =============================================================================

name: Validation nemOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: "Validation du projet"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Installation des outils
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck jq 2>/dev/null

      - name: Vérification des fichiers requis
        run: |
          echo "=== Verification des fichiers requis ==="
          ERRORS=0
          for f in \
            build.sh README.md LICENSE \
            packages/packages.i686 \
            nem/profiledef.sh nem/pacman.conf \
            nem/airootfs/etc/os-release \
            nem/airootfs/usr/share/themes/nemOS-Dark/gtk-3.0/gtk.css \
            nemOS-assets/logo/nemos-logo.svg \
            nemOS-assets/wallpapers/nemos-default.png \
            nemOS-store/nemos-store.py \
            nemOS-store/package-catalog.json; do
            if [[ -f "$f" ]]; then
              echo "  OK $f"
            else
              echo "  MANQUANT : $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [[ $ERRORS -gt 0 ]]; then
            echo "ERREUR: $ERRORS fichiers manquants"
            exit 1
          fi

      - name: ShellCheck (non bloquant)
        continue-on-error: true
        run: |
          echo "=== ShellCheck ==="
          find . -name "*.sh" -not -path "./.git/*" | while read -r script; do
            echo "--- $(basename "$script") ---"
            shellcheck -s bash -e SC1090,SC1091,SC2034,SC2086,SC2155,SC2312,SC2015,SC2188,SC2295,SC2005 "$script" 2>&1 || true
          done
          echo "ShellCheck termine (non bloquant)"

      - name: Validation JSON
        run: |
          echo "=== Validation JSON ==="
          find . -name "*.json" -not -path "./.git/*" | while read -r jf; do
            if jq empty "$jf" 2>/dev/null; then
              echo "  OK $jf"
            else
              echo "  INVALIDE: $jf"
              exit 1
            fi
          done

      - name: Verification des doublons de paquets
        run: |
          echo "=== Verification paquets ==="
          DUPES=$(grep -vE '^\s*#|^\s*$' packages/packages.i686 | sort | uniq -d)
          if [[ -n "$DUPES" ]]; then
            echo "ERREUR: Paquets en double:"
            echo "$DUPES"
            exit 1
          fi
          PKG_COUNT=$(grep -cvE '^\s*#|^\s*$' packages/packages.i686)
          echo "  $PKG_COUNT paquets definis, aucun doublon"

      - name: Detection de secrets
        run: |
          echo "=== Securite ==="
          if grep -rE 'ghp_[A-Za-z0-9]{20,}|gho_[A-Za-z0-9]{20,}|BEGIN.*PRIVATE KEY' \
             --include="*.sh" --include="*.py" --include="*.yml" \
             -l . 2>/dev/null | grep -v ".github/workflows" | head -5; then
            echo "ATTENTION: Patterns potentiellement sensibles detectes"
          else
            echo "  OK - Aucun secret detecte"
          fi

      - name: Resume
        if: always()
        run: |
          echo ""
          echo "Validation nemOS : ${{ job.status == 'success' && 'REUSSIE' || 'ECHEE' }}"