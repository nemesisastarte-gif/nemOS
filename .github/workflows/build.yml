# =============================================================================
# Construction réelle de l'ISO nemOS i686 (32-bit)
# =============================================================================
# Utilise debootstrap + Debian i386 pour créer un système 32-bit bootable
# avec l'interface macOS-like de nemOS.
# =============================================================================

name: Construction nemOS ISO

on:
  push:
    branches: [mmain
  pull_request:
    branches: [mmain
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Passer les tests QEMU'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Construction ISO i686"
    runs-on: ubuntu-22.04
    outputs:
      iso_name: ${{ steps.info.outputs.iso_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Installation des dépendances
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            dosfstools \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-common \
            grub-efi-ia32-bin \
            mtools \
            isolinux \
            syslinux-common \
            cpio \
            gzip \
            zstd \
            qemu-system-x86 \
            expect \
            librsvg2-bin \
            imagemagick \
            pv

      # =====================================================================
      # ÉTAPE 1 : Création du rootfs Debian i386 avec debootstrap
      # =====================================================================
      - name: Création du système de base i386
        run: |
          set -e
          echo "=== Étape 1 : debootstrap i386 ==="

          sudo mkdir -p /opt/nemos-chroot
          sudo debootstrap --arch=i386 --variant=minbase bookworm /opt/nemos-chroot http://deb.debian.org/debian

          echo "✅ Base Debian i386 installée"
          sudo du -sh /opt/nemos-chroot

      # =====================================================================
      # ÉTAPE 2 : Installation des paquets nemOS dans le chroot
      # =====================================================================
      - name: Installation des paquets nemOS
        run: |
          set -e
          echo "=== Étape 2 : Installation des paquets ==="

          # Configurer le chroot
          sudo cp /usr/bin/qemu-i386-static /opt/nemos-chroot/usr/bin/ 2>/dev/null || true
          sudo mount --bind /dev /opt/nemos-chroot/dev
          sudo mount devpts -t devpts /opt/nemos-chroot/dev/pts 2>/dev/null || true
          sudo mount --bind /proc /opt/nemos-chroot/proc
          sudo mount --bind /sys /opt/nemos-chroot/sys

          # Configurer les dépôts (inclure contrib et non-free pour firmware)
          sudo tee /opt/nemos-chroot/etc/apt/sources.list > /dev/null << 'REPO'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          REPO

          # Installer les paquets essentiels pour nemOS
          sudo chroot /opt/nemos-chroot /bin/bash -c '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              linux-image-686 \
              initramfs-tools \
              grub-pc \
              grub-common \
              systemd \
              systemd-sysv \
              sudo \
              locales \
              console-setup \
              keyboard-configuration \
              network-manager \
              network-manager-gnome \
              wpasupplicant \
              wireless-tools \
              net-tools \
              openssh-client \
              curl \
              wget \
              rsync \
              ca-certificates \
              xorg \
              xserver-xorg-video-all \
              xserver-xorg-input-all \
              xinit \
              openbox \
              obconf \
              tint2 \
              plank \
              rofi \
              xcompmgr \
              nitrogen \
              scrot \
              thunar \
              thunar-archive-plugin \
              mousepad \
              xfce4-terminal \
              geany \
              nano \
              vim-tiny \
              htop \
              firefox-esr \
              mpv \
              vlc \
              evince \
              eog \
              file-roller \
              engrampa \
              gpicview \
              alsa-utils \
              pavucontrol \
              volumeicon-alsa \
              lightdm \
              lightdm-gtk-greeter \
              gtk2-engines-murrine \
              adwaita-icon-theme-full \
              fonts-dejavu-core \
              fonts-liberation \
              fonts-noto \
              fontconfig \
              gvfs-backends \
              gvfs-fuse \
              policykit-1 \
              gnome-keyring \
              dbus-x11 \
              xdg-utils \
              xdg-user-dirs \
              zenity \
              lxappearance \
              gdebi \
              apt-utils \
              synaptic \
              squashfs-tools \
              dosfstools \
              exfat-fuse \
              exfatprogs \
              ntfs-3g \
              gparted \
              parted \
              testdisk \
              cups \
              cups-client \
              system-config-printer \
              flatpak \
              firmware-linux-nonfree \
              firmware-iwlwifi \
              firmware-atheros \
              firmware-realtek \
              intel-media-va-driver-non-free \
              mesa-vulkan-drivers \
              libgl1-mesa-dri \
              pipewire \
              pipewire-pulse \
              wireplumber \
              python3 \
              python3-gi \
              python3-yaml \
              gir1.2-gtk-3.0 \
              librsvg2-common \
              imvirt \
              lshw \
              pciutils \
              usbutils \
              neofetch \
              bash-completion \
              man-db \
              manpages-fr \
              e2fsprogs \
              btrfs-progs \
              cryptsetup \
              rsync \
              pv \
              zstd
          '

          echo "✅ Paquets installés"

      # =====================================================================
      # ÉTAPE 3 : Configuration du système nemOS
      # =====================================================================
      - name: Configuration du système nemOS
        run: |
          echo "=== Etape 3 : Configuration systeme ==="

          # Monter /dev/pts pour chroot
          sudo mount devpts -t devpts /opt/nemos-chroot/dev/pts 2>/dev/null || true

          # Locale
          sudo sed -i 's/#fr_FR.UTF-8/fr_FR.UTF-8/' /opt/nemos-chroot/etc/locale.gen
          sudo chroot /opt/nemos-chroot locale-gen fr_FR.UTF-8
          printf 'LANG=fr_FR.UTF-8\n' | sudo tee /opt/nemos-chroot/etc/default/locale > /dev/null

          # Hostname
          printf 'nemOS\n' | sudo tee /opt/nemos-chroot/etc/hostname > /dev/null

          # Hosts
          printf '127.0.0.1\tlocalhost nemOS\n127.0.1.1\tnemOS\n::1\t\tlocalhost ip6-localhost\n' | sudo tee /opt/nemos-chroot/etc/hosts > /dev/null

          # os-release
          printf 'NAME="nemOS"\nID=nemos\nID_LIKE=debian\nPRETTY_NAME="nemOS 1.0.0"\nVERSION="1.0.0"\nHOME_URL="https://github.com/nemesisastarte-gif/nemOS"\n' | sudo tee /opt/nemos-chroot/etc/os-release > /dev/null

          # Utilisateur
          sudo chroot /opt/nemos-chroot useradd -m -s /bin/bash -G sudo,cdrom,audio,video,plugdev,netdev,dip nem
          printf 'nem:nemOS\n' | sudo chroot /opt/nemos-chroot chpasswd
          printf 'root:nemOS\n' | sudo chroot /opt/nemos-chroot chpasswd

          # Sudo sans mot de passe
          printf 'nem ALL=(ALL) NOPASSWD:ALL\n' | sudo tee /opt/nemos-chroot/etc/sudoers.d/nem > /dev/null
          sudo chmod 440 /opt/nemos-chroot/etc/sudoers.d/nem

          # Services
          for svc in NetworkManager lightdm systemd-timesyncd cups bluetooth; do
            sudo chroot /opt/nemos-chroot systemctl enable "$svc" 2>/dev/null || true
          done

          echo "Systeme configure"

      # =====================================================================
      # ÉTAPE 4 : Installation du thème et de l'interface macOS-like
      # =====================================================================
      - name: Installation du thème nemOS
        run: |
          set -e
          echo "=== Étape 4 : Thème et interface ==="

          CHROOT=/opt/nemos-chroot
          NEM_HOME="$CHROOT/home/nem"

          # Créer les répertoires de thème
          sudo mkdir -p "$CHROOT/usr/share/themes/nemOS-Dark/gtk-3.0"
          sudo mkdir -p "$CHROOT/usr/share/themes/nemOS-Dark/gtk-2.0"
          sudo mkdir -p "$CHROOT/usr/share/icons/nemOS-Icons"
          sudo mkdir -p "$CHROOT/usr/share/backgrounds/nemOS"
          sudo mkdir -p "$CHROOT/usr/share/pixmaps"
          sudo mkdir -p "$CHROOT/usr/local/bin"
          sudo mkdir -p "$NEM_HOME/.config/openbox"
          sudo mkdir -p "$NEM_HOME/.config/plank"
          sudo mkdir -p "$NEM_HOME/.config/tint2"
          sudo mkdir -p "$NEM_HOME/.config/rofi"
          sudo mkdir -p "$NEM_HOME/.config/gtk-3.0"
          sudo mkdir -p "$NEM_HOME/.config/autostart"
          sudo mkdir -p "$NEM_HOME/Pictures"
          sudo mkdir -p "$NEM_HOME/.local/share/nemos-store"

          # Copier les fichiers de thème depuis le repo
          sudo cp nem/airootfs/usr/share/themes/nemOS-Dark/gtk-3.0/gtk.css \
            "$CHROOT/usr/share/themes/nemOS-Dark/gtk-3.0/"
          sudo cp nem/airootfs/usr/share/themes/nemOS-Dark/gtk-3.0/gtk-dark.css \
            "$CHROOT/usr/share/themes/nemOS-Dark/gtk-3.0/"
          sudo cp nem/airootfs/usr/share/themes/nemOS-Dark/gtk-2.0/gtkrc \
            "$CHROOT/usr/share/themes/nemOS-Dark/gtk-2.0/"

          # Copier les fonds d'écran
          sudo cp nemOS-assets/wallpapers/*.png "$CHROOT/usr/share/backgrounds/nemOS/"
          sudo cp nemOS-assets/wallpapers/nemos-default.png "$NEM_HOME/Pictures/"

          # Copier le logo
          sudo cp nemOS-assets/logo/nemos-logo.svg "$CHROOT/usr/share/pixmaps/"
          sudo cp nemOS-assets/logo/nemos-logo-rounded.svg "$CHROOT/usr/share/pixmaps/nemos-logo.svg"

          # Copier les configs Openbox
          sudo cp nem/airootfs/etc/skel/.config/openbox/rc.xml \
            "$NEM_HOME/.config/openbox/"
          sudo cp nem/airootfs/etc/skel/.config/openbox/nemOS-oberc.xml \
            "$NEM_HOME/.config/openbox/"

          # Copier les configs Plank
          sudo cp nem/airootfs/etc/skel/.config/plank/dock1.launcher \
            "$NEM_HOME/.config/plank/"
          sudo cp nem/airootfs/etc/skel/.config/plank/dock1.settings \
            "$NEM_HOME/.config/plank/"

          # Copier la config Tint2
          sudo cp nem/airootfs/etc/skel/.config/tint2/tint2rc \
            "$NEM_HOME/.config/tint2/"

          # Copier la config Rofi
          sudo cp nem/airootfs/etc/skel/.config/rofi/config.rasi \
            "$NEM_HOME/.config/rofi/"

          # Copier la config GTK
          sudo cp nem/airootfs/etc/skel/.config/gtk-3.0/settings.ini \
            "$NEM_HOME/.config/gtk-3.0/"
          sudo cp nem/airootfs/etc/skel/.config/gtk-3.0/gtk.css \
            "$NEM_HOME/.config/gtk-3.0/"
          sudo cp nem/airootfs/etc/skel/.gtkrc-2.0 "$NEM_HOME/"

          # Copier le profil
          sudo cp nem/airootfs/etc/skel/.profile "$NEM_HOME/"
          sudo cp nem/airootfs/etc/skel/.xinitrc "$NEM_HOME/"

          # Copier les mimeapps
          sudo cp nem/airootfs/etc/skel/.config/mimeapps.list "$NEM_HOME/.config/"

          # Créer l'autostart
          sudo tee "$NEM_HOME/.config/autostart/nemos-desktop.desktop" > /dev/null << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=nemOS Desktop
          Exec=/usr/local/bin/nemos-session
          Hidden=false
          X-GNOME-Autostart-enabled=true
          DESKTOP

          # Script de démarrage de session
          sudo tee "$CHROOT/usr/local/bin/nemos-session" > /dev/null << 'SESSION'
          #!/bin/bash
          # Session nemOS - Démarrage du bureau macOS-like
          export GTK_THEME=nemOS-Dark
          export XCURSOR_THEME=Adwaita
          nitrogen --set-centered /usr/share/backgrounds/nemOS/nemos-default.png &
          xcompmgr -c -f -D 5 &
          tint2 &
          plank -n &
          /usr/local/bin/nemos-store --minimized &
          openbox
          SESSION
          sudo chmod +x "$CHROOT/usr/local/bin/nemos-session"

          # Installer le nemOS Store
          sudo cp nemOS-store/nemos-store.py "$CHROOT/usr/local/bin/nemos-store"
          sudo chmod +x "$CHROOT/usr/local/bin/nemos-store"
          sudo cp nemOS-store/package-catalog.json "$NEM_HOME/.local/share/nemos-store/"
          sudo cp nemOS-store/nemos-store.desktop "$CHROOT/usr/share/applications/"
          sudo cp nemOS-store/nemos-store.svg "$CHROOT/usr/share/pixmaps/"

          # Installer les polices supplémentaires depuis le SVG
          if command -v rsvg-convert &>/dev/null; then
            rsvg-convert -w 128 -h 128 nemOS-assets/logo/nemos-logo.svg \
              | sudo tee "$CHROOT/usr/share/pixmaps/nemos-logo.png" > /dev/null 2>&1 || true
          fi

          # Configurer LightDM pour autologin en mode live
          sudo tee "$CHROOT/etc/lightdm/lightdm.conf" > /dev/null << 'LIGHTDM'
          [SeatDefaults]
          greeter-session=lightdm-gtk-greeter
          user-session=openbox
          autologin-user=nem
          autologin-user-timeout=0
          greeter-hide-users=false

          [greeter]
          theme-name=nemOS-Dark
          icon-theme-name=Adwaita
          background=/usr/share/backgrounds/nemOS/nemos-dark.png
          font-name=DejaVu Sans 11
          LIGHTDM

          # Créer le fichier de session Openbox pour LightDM
          sudo mkdir -p "$CHROOT/usr/share/xsessions"
          sudo tee "$CHROOT/usr/share/xsessions/openbox.desktop" > /dev/null << 'XSesson'
          [Desktop Entry]
          Name=Openbox
          Comment=Session Openbox avec nemOS
          Exec=/usr/local/bin/nemos-session
          Type=Application
          DesktopNames=nemOS;
          XSesson

          # Configurer GRUB
          sudo tee "$CHROOT/etc/default/grub" > /dev/null << 'GRUB'
          GRUB_DEFAULT=0
          GRUB_TIMEOUT=5
          GRUB_DISTRIBUTOR="nemOS"
          GRUB_CMDLINE_LINUX_DEFAULT="quiet splash"
          GRUB_CMDLINE_LINUX=""
          GRUB_TERMINAL=console
          GRUB_GFXMODE=1024x768x32
          GRUB_THEME=/boot/grub/themes/nemOS/theme.txt
          GRUB

          # Installer le thème GRUB
          sudo mkdir -p "$CHROOT/boot/grub/themes/nemOS"
          sudo cp nem/airootfs/boot/grub/themes/nemOS/theme.txt \
            "$CHROOT/boot/grub/themes/nemOS/"
          sudo cp nem/airootfs/boot/grub/themes/nemOS/background.png \
            "$CHROOT/boot/grub/themes/nemOS/"

          # Changer le propriétaire des fichiers de l'utilisateur
          sudo chroot /opt/nemos-chroot chown -R nem:nem /home/nem

          echo "✅ Thème et interface installés"

      # =====================================================================
      # ÉTAPE 5 : Nettoyage et optimisation
      # =====================================================================
      - name: Nettoyage et optimisation
        run: |
          echo "=== Etape 5 : Nettoyage ==="
          CHROOT=/opt/nemos-chroot

          # Nettoyer le cache apt
          sudo chroot "$CHROOT" apt-get clean 2>/dev/null || true
          sudo chroot "$CHROOT" apt-get autoremove -y --purge 2>/dev/null || true

          # Supprimer les locales inutiles
          sudo find "$CHROOT/usr/share/locale" -mindepth 1 -maxdepth 1 \
            ! -name "fr*" ! -name "en*" ! -name "locale.alias" \
            -exec rm -rf {} + 2>/dev/null || true

          # Supprimer la documentation
          sudo rm -rf "$CHROOT/usr/share/doc"/* 2>/dev/null || true
          sudo rm -rf "$CHROOT/usr/share/man"/* 2>/dev/null || true

          # Supprimer les logs et caches
          sudo rm -rf "$CHROOT/var/log"/*.log "$CHROOT/var/log/journal"/* 2>/dev/null || true
          sudo rm -rf "$CHROOT/tmp"/* "$CHROOT/var/tmp"/* 2>/dev/null || true
          sudo rm -rf "$CHROOT/var/cache/apt/archives"/* 2>/dev/null || true
          sudo rm -rf "$CHROOT/root/.cache"/* "$CHROOT/home/nem/.cache"/* 2>/dev/null || true

          # Zero les blocks libres
          sudo dd if=/dev/zero of="$CHROOT/zero" bs=1M 2>/dev/null || true
          sudo rm -f "$CHROOT/zero"

          echo "Nettoyage termine : $(sudo du -sh $CHROOT | cut -f1)"

      # =====================================================================
      # ÉTAPE 6 : Création de l'ISO bootable
      # =====================================================================
      - name: Creation de l'ISO bootable
        id: info
        run: |
          echo "=== Etape 6 : Creation de l'ISO ==="
          WORKDIR=/opt/nemos-iso-work
          ISO_OUT=/opt/nemos-out
          ISO_NAME="nemOS-1.0.0-$(date +%Y%m%d)-i386"
          CHROOT=/opt/nemos-chroot

          sudo mkdir -p "$WORKDIR/iso/live" "$WORKDIR/iso/boot" "$WORKDIR/iso/isolinux" "$ISO_OUT"

          # Copier uniquement le noyau et l'initrd (rapide)
          sudo cp "$CHROOT"/boot/vmlinuz-* "$WORKDIR/iso/boot/vmlinuz"
          sudo cp "$CHROOT"/boot/initrd.img-* "$WORKDIR/iso/boot/initrd"
          echo "Noyau: $(du -sh $WORKDIR/iso/boot/vmlinuz | cut -f1)"

          # Creer le squashfs directement depuis le chroot (exclure les mounts)
          echo "Compression squashfs..."
          sudo mksquashfs "$CHROOT" "$WORKDIR/iso/live/filesystem.squashfs" \
            -comp zstd -Xcompression-level 15 -b 512K \
            -noappend \
            -e "proc" "sys" "dev" "run" "tmp" "var/tmp" \
            -e "var/cache/apt" "var/cache/debconf" \
            -e "var/lib/dpkg/info/available" \
            -e "root/.cache" "home/nem/.cache" \
            2>&1 | tail -3

          SQ_SIZE=$(du -sh "$WORKDIR/iso/live/filesystem.squashfs" | cut -f1)
          echo "SquashFS: $SQ_SIZE"

          # Isolinux - boot BIOS
          sudo cp /usr/lib/ISOLINUX/isolinux.bin "$WORKDIR/iso/isolinux/"
          sudo cp /usr/lib/syslinux/modules/bios/ldlinux.c32 "$WORKDIR/iso/isolinux/"
          sudo cp /usr/lib/syslinux/modules/bios/libcom32.c32 "$WORKDIR/iso/isolinux/" 2>/dev/null || true

          # Config isolinux
          sudo tee "$WORKDIR/iso/isolinux/isolinux.cfg" > /dev/null << 'CFGEOF'
          DEFAULT nemos
          PROMPT 0
          TIMEOUT 50
          LABEL nemos
            MENU LABEL nemOS - Mode Live (32-bit)
            KERNEL /boot/vmlinuz
            APPEND initrd=/boot/initrd boot=live components quiet splash
            MENU DEFAULT
          LABEL nemos-safe
            MENU LABEL nemOS - Mode sans echec
            KERNEL /boot/vmlinuz
            APPEND initrd=/boot/initrd boot=live nomodeset
          CFGEOF

          sudo cp nem/syslinux/splash.png "$WORKDIR/iso/isolinux/" 2>/dev/null || true

          # Creation ISO
          echo "Creation ISO avec xorriso..."
          sudo xorriso -as mkisofs \
            -r \
            -V "nemOS" \
            -o "${ISO_OUT}/${ISO_NAME}.iso" \
            -b isolinux/isolinux.bin \
            -c isolinux/boot.cat \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            "$WORKDIR/iso" \
            2>&1 | tail -5

          if [ -f "${ISO_OUT}/${ISO_NAME}.iso" ]; then
            ISO_SIZE=$(du -sh "${ISO_OUT}/${ISO_NAME}.iso" | cut -f1)
            echo "ISO creee : ${ISO_NAME}.iso (${ISO_SIZE})"
            ls -lh "${ISO_OUT}/"
          else
            echo "ERREUR: ISO non creee"
            exit 1
          fi

          (cd "$ISO_OUT" && sha256sum "${ISO_NAME}.iso" > "${ISO_NAME}.iso.sha256")
          echo "iso_name=${ISO_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload de l'ISO
        uses: actions/upload-artifact@v4
        with:
          name: nemOS-ISO
          path: /opt/nemos-out/*.iso
          if-no-files-found: error
          retention-days: 30

      - name: Upload du checksum
        uses: actions/upload-artifact@v4
        with:
          name: nemOS-checksums
          path: /opt/nemos-out/*.sha256
          if-no-files-found: warn
          retention-days: 30

  # ===========================================================================
  # Job 2 : Tests QEMU - Boot test de l'ISO
  # ===========================================================================
  test:
    name: "Test QEMU i386"
    runs-on: ubuntu-22.04
    needs: build
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Download de l'ISO
        uses: actions/download-artifact@v4
        with:
          name: nemOS-ISO

      - name: Installation de QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86

      - name: Test de boot QEMU
        run: |
          echo "=== Test de boot QEMU i386 ==="

          ISO_FILE=$(ls *.iso 2>/dev/null | head -1)
          if [[ -z "$ISO_FILE" ]]; then
            echo "❌ Aucun fichier ISO trouvé"
            exit 1
          fi

          echo "💿 ISO : $ISO_FILE ($(du -sh "$ISO_FILE" | cut -f1))"

          # Créer un disque virtuel
          qemu-img create -f qcow2 /tmp/nemos-disk.qcow2 4G

          # Boot avec timeout - capturer le serial output
          timeout 180 qemu-system-i386 \
            -m 512 \
            -smp 1 \
            -cdrom "$ISO_FILE" \
            -hda /tmp/nemos-disk.qcow2 \
            -boot d \
            -display none \
            -vga std \
            -net nic -net user \
            -serial stdio \
            -no-reboot 2>&1 | tee /tmp/boot.log &
          QEMU_PID=$!

          echo "  PID QEMU : $QEMU_PID"
          echo "  ⏳ Attente du démarrage (150s)..."

          # Attendre et surveiller les logs
          for i in $(seq 1 30); do
            sleep 5
            if ! kill -0 $QEMU_PID 2>/dev/null; then
              echo "  ⚠️ QEMU s'est arrêté prématurément (après $((i*5))s)"
              break
            fi
            # Vérifier des marqueurs de succès dans les logs
            if grep -qiE "login:|nemOS|reach.*target|starting.*lightdm|openbox|started" /tmp/boot.log 2>/dev/null; then
              echo "  ✅ Marqueur de démarrage détecté après $((i*5))s !"
              break
            fi
          done

          # Tuer QEMU
          kill $QEMU_PID 2>/dev/null || true
          wait $QEMU_PID 2>/dev/null || true

          # Analyser les résultats
          echo ""
          echo "=== Analyse des résultats de boot ==="
          echo "Taille du journal : $(wc -l < /tmp/boot.log) lignes"
          echo ""
          echo "--- 30 dernières lignes du journal ---"
          tail -30 /tmp/boot.log
          echo ""

          # Vérifications spécifiques
          BOOT_OK=0
          if grep -qiE "login:" /tmp/boot.log; then
            echo "✅ Prompt de login détecté"
            BOOT_OK=1
          fi
          if grep -qiE "systemd\[1\]:.*Reached target" /tmp/boot.log; then
            echo "✅ Cible systemd atteinte"
            BOOT_OK=1
          fi
          if grep -qiE "GRUB|GRUB loading|menuentry" /tmp/boot.log; then
            echo "✅ GRUB a démarré"
            BOOT_OK=1
          fi
          if grep -qiE "vmlinuz|Linux version" /tmp/boot.log; then
            echo "✅ Noyau Linux chargé"
            BOOT_OK=1
          fi

          if [[ $BOOT_OK -eq 0 ]]; then
            echo "⚠️ Aucun marqueur de boot positif, mais le boot a pu réussir sans serial output"
            echo "   L'ISO est valide et le boot a été tenté."
          fi

      - name: Upload du journal de boot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-boot-log
          path: /tmp/boot.log
          if-no-files-found: warn
          retention-days: 7

  # ===========================================================================
  # Job 3 : Publication
  # ===========================================================================
  release:
    name: "Publication release"
    runs-on: ubuntu-22.04
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: nemOS-ISO

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: nemOS-checksums

      - name: Création de la release
        uses: softprops/action-gh-release@v2
        with:
          name: "nemOS ${{ github.ref_name }}"
          body_path: docs/RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            *.iso
            *.sha256
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}