<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1E2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#11111B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A73E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Fond arrondi -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Sac d'achat (forme) -->
  <path d="M38 48 L38 96 Q38 102 44 102 L84 102 Q90 102 90 96 L90 48 Z"
        fill="url(#accent)" stroke="none"/>
  <!-- Anse du sac -->
  <path d="M46 48 Q46 30 64 30 Q82 30 82 48"
        fill="none" stroke="#CDD6F4" stroke-width="5" stroke-linecap="round"/>
  <!-- Lettre 'n' stylisée -->
  <text x="64" y="84" text-anchor="middle" font-family="Sans,Helvetica,Arial"
        font-size="38" font-weight="bold" fill="#CDD6F4">n</text>
  <!-- Petites étoiles décoratives -->
  <circle cx="30" cy="30" r="2" fill="#1A73E8" opacity="0.6"/>
  <circle cx="98" cy="25" r="1.5" fill="#1A73E8" opacity="0.4"/>
  <circle cx="22" cy="60" r="1.5" fill="#1A73E8" opacity="0.5"/>
  <circle cx="106" cy="55" r="2" fill="#1A73E8" opacity="0.3"/>
</svg>