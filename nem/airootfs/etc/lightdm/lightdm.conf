# Configuration LightDM pour nemOS
# Gestionnaire d'affichage léger

[SeatDefaults]
# Gestionnaire de greeter
greeter-session=lightdm-gtk-greeter
# Session par défaut
user-session=openbox
# Pas d'autologin (sécurité)
greeter-hide-users=false
greeter-show-manual-login=true

# Apparence du greeter
[greeter]
# Thème GTK
theme-name=nemOS-Dark
# Icônes
icon-theme-name=nemOS-Icons
# Fond d'écran du greeter
background=/usr/share/backgrounds/nemOS/nemos-dark.png
# Police
font-name=Noto Sans 11
# Positionnement du panneau
panel-position=top
# Indicateur de clavier
indicators=~host;~spacer;~clock;~spacer;~power

[XDMCPServer]
enabled=false

[VNCServer]
enabled=false
