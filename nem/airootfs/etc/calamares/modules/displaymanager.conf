---
# Module : Gestionnaire d'affichage (displaymanager)
# Configuration de LightDM - nemOS

# Gestionnaire d'affichage à utiliser
# lightdm-gtk-greeter est le greeter par défaut de nemOS
displaymanagers:
  - lightdm

# Configuration de LightDM
lightdm:
  greeter: "lightdm-gtk-greeter"
  greeterSession: "lightdm-gtk-greeter"

# Configuration du greeter GTK
# Thème sombre en accord avec le thème nemOS
lightdm_gtk_greeter:
  theme-name: "nemos-dark"
  icon-theme-name: "Papirus-Dark"
  font-name: "Noto Sans 10"
  background: "/usr/share/backgrounds/nemos-default.png"
  default-session: "openbox"
  hide-user-image: true
  show-clock: true
  clock-format: "%H:%M"
  panels-position: "top"
  indicators:
    - "~host"
    - "~spacer"
    - "~clock"
    - "~spacer"
    - "~power"

# Session par défaut
# openbox est le gestionnaire de fenêtres léger par défaut de nemOS
defaultDesktopEnvironment:
  executable: "openbox"
  desktopFile: "openbox.desktop"

# Nom d'affichage de l'environnement de bureau
desktopEnvironments:
  - executable: "openbox"
    desktopFile: "openbox.desktop"

# Configuration de l'autologin
# Désactivé par défaut pour la sécurité
# L'utilisateur devra saisir son mot de passe à chaque connexion
enableAutologin: false