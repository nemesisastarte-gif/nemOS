---
# Module : Paramètres régionaux (locale)
# Configuration de la langue et de la locale - nemOS

# Langue géographique par défaut
# Format : code_pays/code_langue
geoip:
  style:  "none"

# Région et zone géographique par défaut
# Le français est la langue principale de nemOS
regionAndZone:
  region: "Europe"
  zone:   "Paris"

# Locales disponibles
# Seul le français est affiché initialement
localeGenPath: "/etc/locale.gen"

# Format de la locale
# UTF-8 est le seul encodage supporté
# La locale par défaut est fr_FR.UTF-8