---
# Module : Processus Shell (shellprocess)
# Scripts post-installation personnalisés - nemOS
# Ce module exécute des commandes shell après la copie des fichiers
# sur le disque cible pour finaliser la configuration.

# Le script est exécuté dans le contexte de l'utilisateur cible (chroot)
# si "dontChroot" n'est pas défini. Ici on utilise un script externe
# qui gère lui-même les opérations dans et hors du chroot.

# Le script de post-installation
# Il doit être exécuté APRÈS la copie des fichiers mais AVANT le redémarrage
script: "/usr/lib/nemos-postinstall/nemos-postinstall.sh"

# Ne pas exécuter dans le chroot pour certaines opérations
# (la gestion du live user doit se faire hors chroot)
# Le script lui-même gérera les opérations chroot si nécessaire
dontChroot: false

# Timeout en secondes (10 minutes max pour le script post-install)
timeout: 600

# -----------------------------------------------------------------
# ALTERNATIVE : commandes inline
# Si le script externe n'est pas disponible, les commandes suivantes
# sont exécutées à la place.
# -----------------------------------------------------------------
# (Laisser vide si le script est disponible)

