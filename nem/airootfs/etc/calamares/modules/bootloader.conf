---
# Module : Chargeur d'amorçage (bootloader)
# Configuration de GRUB pour BIOS (i386-pc) - nemOS 32-bit

# Installateur : GRUB
# Cible : BIOS (i386-pc) car nemOS est une distribution 32-bit
# PAS de support EFI pour les systèmes 32-bit
installPath: /boot
efiBootLoader: ""
efiInstallAsRemovable: false

# GRUB pour BIOS (i386-pc)
# C'est la cible correcte pour les systèmes 32-bit legacy
grubInstall:
  # Ne PAS installer le chargeur EFI
  installEFI: false
  # Installer GRUB pour BIOS (MBR)
  biosInstall: true
  # Utiliser grub-install avec la cible i386-pc
  target: "i386-pc"

# Nom de l'entrée dans le menu GRUB
bootloaderEntryName: "nemOS"

# Délai d'attente avant le démarrage automatique (en secondes)
grubTimeout: 5

# Thème GRUB personnalisé
grubTheme: "/boot/grub/themes/nemOS/theme.txt"

# Paramètres supplémentaires du noyau passés par GRUB
kernelParams: []

# Paramètres GRUB supplémentaires (fichier /etc/default/grub)
grubConfig:
  GRUB_TIMEOUT:          5
  GRUB_DISTRIBUTOR:      "nemOS"
  GRUB_CMDLINE_LINUX:    ""
  GRUB_CMDLINE_LINUX_DEFAULT: "quiet splash"
  GRUB_TERMINAL_OUTPUT:  "console"
  GRUB_GFXMODE:          "1024x768x32"
  GRUB_THEME:            "/boot/grub/themes/nemOS/theme.txt"
  GRUB_DISABLE_SUBMENU:  "y"
  GRUB_DISABLE_RECOVERY: "true"

# Ne pas installer les entrées de récupération (économie d'espace)
# sur les systèmes 32-bit
recovery: false