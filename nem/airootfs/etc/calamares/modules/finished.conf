---
# Module : Terminé (finished)
# Page finale de l'installation - nemOS

# Case à cocher "Redémarrer maintenant"
restartNowEnabled: true

# Cocher la case par défaut
restartNowChecked: true

# Texte du bouton de redémarrage
restartNowCommand: "shutdown -r now"

# Afficher le bouton "Redémarrer maintenant"
restartNowMode: "user"

# Case à cocher "Afficher le journal d'installation"
# Désactivé : les utilisateurs novices n'ont pas besoin du journal
showLogCheckbox: false

# Chemin du fichier journal
logPath: "/var/log/calamares/install.log"

# Ne PAS afficher le bouton "Voir le journal" dans la page de fin
# (les détails techniques ne sont pas nécessaires pour les utilisateurs courants)

# Message de fin personnalisé
# Ce message s'affiche quand l'installation est terminée avec succès
# (Le texte par défaut du branding.desc sera utilisé)