---
# Module : Services (services)
# Activation des services systemd au démarrage - nemOS

# Liste des services à ACTIVER (enabled)
# Ces services démarreront automatiquement après l'installation
services:
  # Gestion du réseau
  - name: "NetworkManager"
    mandatory: true
  # Bluetooth
  - name: "bluetooth"
    mandatory: false
  # Impression (CUPS)
  - name: "cups"
    mandatory: false
  # Gestionnaire d'affichage (LightDM)
  - name: "lightdm"
    mandatory: true
  # Synchronisation de l'heure (NTP)
  - name: "systemd-timesyncd"
    mandatory: false

# Liste des services à DÉSACTIVER (disabled)
# Ces services NE démarreront PAS automatiquement
disable:
  # Désactiver le service de réseau par défaut (remplacé par NetworkManager)
  - name: "systemd-networkd"
    mandatory: false
  # Désactiver le résolveur DNS par défaut
  - name: "systemd-resolved"
    mandatory: false

# Cibles par défaut
# Le système démarrera avec le target multi-user (graphique via LightDM)
defaultTarget: "graphical.target"