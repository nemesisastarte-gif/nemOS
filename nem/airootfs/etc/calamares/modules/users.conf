---
# Module : Utilisateurs (users)
# Configuration du premier utilisateur - nemOS

# Groupes par défaut assignés au nouvel utilisateur
defaultGroups:
  - wheel        # sudo / droits d'administration
  - audio        # accès aux périphériques audio
  - video        # accès aux périphériques vidéo
  - optical      # accès aux lecteurs optiques (CD/DVD)
  - storage      # accès aux périphériques de stockage amovibles
  - network      # gestion du réseau
  - lp           # accès aux imprimantes
  - scanner      # accès aux scanners
  - power        # gestion de l'alimentation (suspendu, extinction)

# Shell par défaut
defaultShell: /bin/bash

# Nom d'hôte par défaut (l'utilisateur peut le modifier)
hostname: nemOS-pc

# Configuration sudo
# Utiliser sudo avec demande de mot de passe
sudoersGroup: wheel

# Configuration de l'autologin
# Désactivé par défaut pour la sécurité
autologinGroup: ""

# Nombre maximal de caractères pour le nom d'utilisateur
maxPasswordLength: 128

# Politique de mot de passe
# Le mot de passe de l'utilisateur root doit être défini
setRootPassword: true

# Permettre les mots de passe faibles (non recommandé)
allowWeakPasswords: false
allowWeakPasswordsDefault: false

# Vérification de la force du mot de passe
# Nombre minimal de caractères
minimumPasswordLength: 6

# Hachage du mot de passe
passwordHashStrength: 1  # SHA512

# Exigences pour le nom d'utilisateur
userInput:
  - "hostname"
  - "fullName"
  - "username"
  - "password"
  - "sudo"

# Champs pré-remplis
hostname:
  value: "nemOS-pc"
  editable: true

fullName:
  value: ""
  editable: true

username:
  value: ""
  editable: true