---
# Module : Paquets (packages)
# Gestion des paquets à installer - nemOS

# Gestionnaire de paquets à utiliser
# pacman est le gestionnaire de paquets d'Arch Linux
packageManager: pacman

# Le système de base est déjà installé dans l'ISO
# Aucun paquet supplémentaire n'est spécifié ici
# Les paquets sont installés lors de la construction de l'ISO

# Liste des paquets à installer en plus du système de base
# (vide car tout est déjà dans l'ISO)
packages:
  # Pas de paquets supplémentaires
  # Décommentez et ajoutez des paquets si nécessaire :
  # - name: "firefox"
  #   install: true
  # - name: "thunderbird"
  #   install: false

# Opérations post-installation du gestionnaire de paquets
# Pas de nettoyage automatique (géré par le script post-install)
update: false
update_system: false

# Ne pas mettre à jour le miroir local pendant l'installation
# (l'ISO est déjà à jour)
skip_if_no_internet: true

# Ne pas afficher de détails sur l'installation des paquets
# (tout est déjà dans le système live)