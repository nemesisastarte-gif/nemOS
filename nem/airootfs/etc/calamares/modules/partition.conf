---
# Module : Partitionnement (partition)
# Gestion du partitionnement du disque - nemOS

# Système de fichiers par défaut
defaultFileSystemType: "ext4"

# Systèmes de fichiers disponibles dans le menu déroulant
availableFileSystemTypes:
  - "ext4"
  - "ext3"
  - "btrfs"
  - "xfs"
  - "f2fs"
  - "jfs"
  - "reiserfs"

# Options spécifiques aux systèmes de fichiers
# Compression zstd pour btrfs
btrfsOptions:
  - "compress=zstd"
  - "ssd"
  - "noatime"

# Partitionnement par défaut
# L'utilisateur peut choisir entre :
#  - Effacer le disque (partitionnement automatique)
#  - Partitionnement manuel (avancé)
#  - Remplacer une partition
#  - Partitionnement alongside
partitionLayout:
  - name:     "nemOS"
    type:     "8300"   # Type code pour Linux filesystem (GPT) / 83 (MBR)
    filesystem: "ext4"
    mountPoint: "/"
    size:      100%
    features:
      - "64bit"
      - "dir_index"
      - "filetype"
      - "flex_bg"
      - "has_journal"
      - "huge_file"
      - "large_file"
      - "sparse_super2"
    label:     "nemOS"

# Taille de la partition swap (si le swap sur partition est choisi)
# 256 Mo comme demandé
luksGeneration: ""
enableLuksAutomatedPartitioning: false

# Partition de swap
# Taille par défaut : 256 Mo (pour les systèmes 32-bit)
# Le swap sur fichier peut aussi être utilisé
partitionLayoutSwap:
  - name:       "swap"
    type:       "8200"   # Linux swap
    filesystem: "swap"
    mountPoint: "none"
    size:       256 MiB
    label:      "swap"

# Autoriser le partitionnement manuel (mode avancé)
# Les options avancées seront disponibles pour les utilisateurs expérimentés
userPartitionChoices:
  - "none"        # Partitionnement automatique
  - "manual"      # Partitionnement manuel (avancé)
  - "replace"     # Remplacer une partition existante
  - "alongside"   # Installer à côté d'un système existant

# Espaces de noms mountpoints
# Les répertoires /boot, /home, etc. peuvent être configurés
# séparément si l'utilisateur choisit le partitionnement manuel
mountOptions:
  default: "defaults,noatime"
  btrfs:
    - "compress=zstd"
    - "ssd"
    - "noatime"
    - "space_cache=v2"