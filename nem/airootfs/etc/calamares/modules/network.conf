---
# Module : Réseau (network)
# Configuration du réseau via NetworkManager - nemOS

# NetworkManager est déjà installé dans l'ISO
# Pas besoin d'installer des paquets supplémentaires
# NetworkManager sera activé par le module "services"

# Ne PAS installer de paquets réseau supplémentaires
# (tout est déjà inclus dans l'ISO)
install: false

# Packages réseau (optionnel, mais on n'installe rien)
# La liste est vide car NetworkManager est déjà présent
packages:
  - networkmanager

# Activer NetworkManager au démarrage
# (géré par le module "services" mais rappelé ici)
# Si le module network est utilisé pour configurer le réseau,
# il utilisera NetworkManager
useNetworkManager: true

# Ne pas configurer de connexion filaire automatiquement
# L'utilisateur configurera son réseau après le premier démarrage
# (ou via le gestionnaire de réseau de nemOS)