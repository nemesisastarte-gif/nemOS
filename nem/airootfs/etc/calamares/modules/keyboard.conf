---
# Module : Clavier (keyboard)
# Configuration du clavier - nemOS

# Clavier par défaut : Français
# Layout : fr (Français)
# Variant : oss (AFNOR / OSS / AltGr和国际)
#   oss = variante recommandée pour le français moderne
#   avec accès direct aux caractères accentués et symboles
layout:    "fr"
variant:   "oss"

# Modèle de clavier
# pc105 est le modèle standard 105 touches
model:     "pc105"

# Tester le clavier dans l'installateur
# Affiche un champ de texte pour tester la disposition
xOrgConfFileName: "/etc/X11/xorg.conf.d/00-keyboard.conf"

# Raccourcis de permutation de disposition
# Alt+Shift pour basculer entre les dispositions (si plusieurs)
switchLayout: false