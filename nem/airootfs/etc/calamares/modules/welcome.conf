---
# Module : Bienvenue (welcome)
# Page d'accueil de l'installeur Calamares - nemOS

# Afficher ou masquer les liens en bas de page
showSupportUrl:      false
showKnownIssuesUrl:  false
showReleaseNotesUrl: true
showDonateUrl:       false

# Configuration des exigences minimales
requirements:
  - storage: 8           # Espace minimal requis (Go)
    ram: 0.5             # RAM minimale requise (Go)
    check:
      - storage          # Vérifier l'espace disque
      - ram              # Vérifier la mémoire vive
      - power            # Vérifier l'alimentation (sur batterie ?)
    required:
      - storage          # L'espace disque est obligatoire
      - ram              # La RAM est obligatoire
      # power n'est pas obligatoire (juste un avertissement)

# Politique en cas de exigences non satisfaites
# "strict"  : bloque l'installation
# "warning" : affiche un avertissement mais permet de continuer
# "continue": passe silencieusement
requirementsSatisfiedMessage: ""
requirementsErrorMessage:    "<p>Cet ordinateur ne répond pas aux exigences minimales pour installer nemOS.</p>
                              <p>Exigences :</p>
                              <ul>
                                <li>8 Go d'espace disque disponible</li>
                                <li>512 Mo de mémoire vive (RAM)</li>
                              </ul>"