# Configuration Syslinux - Amorçage système standard nemOS

DEFAULT nemOS
PROMPT 0
TIMEOUT 30

LABEL nemOS
  MENU LABEL nemOS - Démarrer en mode live
  LINUX /%INSTALL_DIR%/boot/i686/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/i686/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL%

LABEL nemOS-nomodeset
  MENU LABEL nemOS - Mode sans pilote graphique (nomodeset)
  LINUX /%INSTALL_DIR%/boot/i686/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/i686/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% nomodeset

LABEL memtest
  MENU LABEL Tester la mémoire (memtest86+)
  LINUX /boot/memtest86+/memtest.bin