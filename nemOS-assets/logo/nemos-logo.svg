<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A73E8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A73E8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Hexagone externe avec arrondis -->
  <polygon
    points="256,42 432,149 432,363 256,470 80,363 80,149"
    fill="url(#bgGrad)"
    stroke="url(#accentGrad)"
    stroke-width="4"
    filter="url(#shadow)"
    rx="20"
  />

  <!-- Hexagone intérieur subtil -->
  <polygon
    points="256,82 398,172 398,340 256,430 114,340 114,172"
    fill="none"
    stroke="rgba(255,255,255,0.08)"
    stroke-width="1.5"
  />

  <!-- Lettre 'n' stylisée -->
  <g filter="url(#glow)">
    <!-- Barre verticale gauche du 'n' -->
    <path
      d="M 185 160 L 185 370"
      stroke="white"
      stroke-width="38"
      stroke-linecap="round"
      fill="none"
    />
    <!-- Arc du 'n' -->
    <path
      d="M 185 160 C 185 160, 185 265, 327 265 C 327 265, 327 160, 327 160"
      stroke="white"
      stroke-width="38"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>

  <!-- Point d'accentuation bleu -->
  <circle cx="327" cy="370" r="8" fill="url(#accentGrad)" filter="url(#glow)"/>
</svg>